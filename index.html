function calc(){
let a=prompt("Enter expression (e.g 5+5)");
alert(eval(a));
}
function age(){
let y=prompt("Enter birth year");
alert("Age: "+(new Date().getFullYear()-y));
}
function bmi(){
let w=prompt("Weight (kg)");
let h=prompt("Height (m)");
alert("BMI: "+(w/(h*h)).toFixed(2));
}
function emi(){
let p=prompt("Loan amount");
let r=prompt("Interest %");
let n=prompt("Months");
r=r/1200;
alert("EMI: "+((p*r)/(1-Math.pow(1+r,-n))).toFixed(2));
}
function percent(){
let n=prompt("Number");
let p=prompt("Percent");
alert((n*p)/100);
}
function discount(){
let price=prompt("Price");
let d=prompt("Discount %");
alert(price-(price*d/100));
}
function word(){
let t=prompt("Enter text");
alert(t.split(" ").length);
}
function char(){
let t=prompt("Enter text");
alert(t.length);
}
function reverse(){
let t=prompt("Enter text");
alert(t.split("").reverse().join(""));
}
function upper(){
let t=prompt("Enter text");
alert(t.toUpperCase());
}
function lower(){
let t=prompt("Enter text");
alert(t.toLowerCase());
}
function slug(){
let t=prompt("Enter text");
alert(t.toLowerCase().replace(/\s+/g,"-"));
}
function base64(){
let t=prompt("Enter text");
alert(btoa(t));
}
function uuid(){
alert(crypto.randomUUID());
}
function timestamp(){
alert(Date.now());
}
function random(){
alert(Math.floor(Math.random()*10000));
}
function password(){
alert(Math.random().toString(36).slice(-8));
}
function color(){
alert("#"+Math.floor(Math.random()*16777215).toString(16));
}
function binary(){
let t=prompt("Enter text");
alert([...t].map(c=>c.charCodeAt(0).toString(2)).join(" "));
}
function timer(){
alert("Timer started 5 sec");
setTimeout(()=>alert("Time up"),5000);
}
function stopwatch(){
let start=Date.now();
alert("Press OK to stop");
alert("Time: "+((Date.now()-start)/1000)+" sec");
}

</script>
