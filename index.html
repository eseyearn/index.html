<!-- TOOLS -->

<div id="pass" class="section">
<h3>Password Generator</h3>
<button onclick="genPass()">Generate</button>
<p id="passout"></p>
</div>

<div id="age" class="section">
<h3>Age Calculator</h3>
<input type="date" id="dob">
<button onclick="calcAge()">Calculate</button>
<p id="ageout"></p>
</div>

<div id="emi" class="section">
<h3>EMI Calculator</h3>
<input type="number" id="loan" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate %">
<input type="number" id="time" placeholder="Months">
<button onclick="calcEMI()">Calculate</button>
<p id="emiout"></p>
</div>

<div id="qr" class="section">
<h3>QR Generator</h3>
<input type="text" id="qrtext">
<button onclick="makeQR()">Generate</button>
<div id="qrout"></div>
</div>

<div id="word" class="section">
<h3>Word Counter</h3>
<textarea id="wordinput" oninput="countWord()"></textarea>
<p id="wordout">Words: 0</p>
</div>

<div id="thumb" class="section">
<h3>YouTube Thumbnail</h3>
<input type="text" id="ytlink">
<button onclick="getThumb()">Get Thumbnail</button>
<div id="thumbout"></div>
</div>

<footer>Developer: Amir Hamza</footer>

<!-- POP ADS -->
<script src="https://pl28764018.effectivegatecpm.com/db/ae/86/dbae860c34bd2584045c04e858a7885b.js"></script>
<script src="https://pl28764009.effectivegatecpm.com/88/9f/d0/889fd0e78a836626363de1ffb8c7293a.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
}

function genPass(){
document.getElementById("passout").innerText=Math.random().toString(36).slice(-12);
}

function calcAge(){
let dob=new Date(document.getElementById("dob").value);
let diff=Date.now()-dob.getTime();
let age=new Date(diff);
document.getElementById("ageout").innerText=Math.abs(age.getUTCFullYear()-1970)+" Years";
}

function calcEMI(){
let P=document.getElementById("loan").value;
let r=document.getElementById("rate").value/1200;
let n=document.getElementById("time").value;
let emi=(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
document.getElementById("emiout").innerText="EMI: "+emi.toFixed(2);
}

function makeQR(){
document.getElementById("qrout").innerHTML="";
new QRCode(document.getElementById("qrout"),document.getElementById("qrtext").value);
}

function countWord(){
let text=document.getElementById("wordinput").value.trim();
let words=text?text.split(/\s+/).length:0;
document.getElementById("wordout").innerText="Words: "+words;
}

function getThumb(){
let url=document.getElementById("ytlink").value;
let id=url.split("v=")[1];
if(id){
id=id.split("&")[0];
let img="https://img.youtube.com/vi/"+id+"/maxresdefault.jpg";
document.getElementById("thumbout").innerHTML="<img src='"+img+"'><br><a href='"+img+"' download><button>Download</button></a>";
}
}
</script>

</body>
