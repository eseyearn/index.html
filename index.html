<div class="tools">
<button onclick="word()">Word Count</button>
<button onclick="char()">Char Count</button>
<button onclick="reverse()">Reverse</button>
<button onclick="upper()">Uppercase</button>
<button onclick="lower()">Lowercase</button>
<button onclick="percent()">Percent</button>

<script>

function showInput(label, callback){
document.getElementById("toolArea").innerHTML = `
<h3>${label}</h3>
<input id="userInput">
<br>
<button class="runbtn" onclick="runTool()">Run</button>
<p id="result"></p>
`;

window.runTool = function(){
let val = document.getElementById("userInput").value;
document.getElementById("result").innerText = callback(val);
}
}

function word(){ showInput("Enter text", v=>v.split(" ").length+" words"); }
function char(){ showInput("Enter text", v=>v.length+" characters"); }
function reverse(){ showInput("Enter text", v=>v.split("").reverse().join("")); }
function upper(){ showInput("Enter text", v=>v.toUpperCase()); }
function lower(){ showInput("Enter text", v=>v.toLowerCase()); }
function percent(){ showInput("Enter number,percent (100,10)", v=>{
let x=v.split(",");
return (x[0]*x[1]/100);
}); }

function random(){
document.getElementById("toolArea").innerHTML="<h3>Random Number</h3><p>"+Math.floor(Math.random()*10000)+"</p>";
}

function password(){
document.getElementById("toolArea").innerHTML="<h3>Password</h3><p>"+Math.random().toString(36).slice(-10)+"</p>";
}

</script>
