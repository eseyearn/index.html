<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function calcAge(){
let dob=new Date(document.getElementById('dob').value);
let diff=Date.now()-dob.getTime();
let age=new Date(diff);
document.getElementById('ageResult').innerHTML=
"Age: "+Math.abs(age.getUTCFullYear()-1970)+" years";
}

function calcEMI(){
let P=document.getElementById('loan').value;
let R=document.getElementById('rate').value/12/100;
let N=document.getElementById('month').value;
let EMI=(P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);
document.getElementById('emiResult').innerHTML=
"Monthly EMI: "+EMI.toFixed(2);
}

function countWord(){
let text=document.getElementById('text').value;
let words=text.trim().split(/\s+/).length;
document.getElementById('wordResult').innerHTML=
"Words: "+words;
}

function genPass(){
let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#";
let pass="";
for(let i=0;i<12;i++){
pass+=chars.charAt(Math.floor(Math.random()*chars.length));
}
document.getElementById('passResult').innerHTML=pass;
}
</script>
