<script>
function unlockTools(){
let time=8;
let btn=document.getElementById("unlockBtn");
btn.disabled=true;
let t=setInterval(()=>{
time--;
btn.innerText="Wait "+time+"s";
if(time<=0){
clearInterval(t);
btn.innerText="Enter Tools";
btn.disabled=false;
btn.onclick=()=>{document.getElementById("toolSection").style.display="block";}
}
},1000);
}

function wordCount(){
toolArea.innerHTML='<textarea id="txt" rows=4 cols=30></textarea><br><button onclick="wc()">Count</button><p id="result"></p>';
}
function wc(){
result.innerText=txt.value.trim().split(/\s+/).length;
}

function charCount(){
toolArea.innerHTML='<textarea id="txt" rows=4 cols=30></textarea><br><button onclick="cc()">Count</button><p id="result"></p>';
}
function cc(){
result.innerText=txt.value.length;
}

function reverse(){
toolArea.innerHTML='<input id="txt"><br><button onclick="rv()">Reverse</button><p id="result"></p>';
}
function rv(){ result.innerText=txt.value.split("").reverse().join(""); }

function upper(){
toolArea.innerHTML='<input id="txt"><br><button onclick="up()">Upper</button><p id="result"></p>';
}
function up(){ result.innerText=txt.value.toUpperCase(); }

function lower(){
toolArea.innerHTML='<input id="txt"><br><button onclick="lw()">Lower</button><p id="result"></p>';
}
function lw(){ result.innerText=txt.value.toLowerCase(); }

function random(){
toolArea.innerHTML='<button onclick="rn()">Generate</button><p id="result"></p>';
}
function rn(){ result.innerText=Math.random(); }

function password(){
toolArea.innerHTML='<button onclick="pw()">Generate</button><p id="result"></p>';
}
function pw(){
let chars="abcdefghijklmnopqrstuvwxyz0123456789";
let pass="";
for(let i=0;i<8;i++) pass+=chars[Math.floor(Math.random()*chars.length)];
result.innerText=pass;
}

function percent(){
toolArea.innerHTML='<input id="a"><input id="b"><br><button onclick="pc()">Calc</button><p id="result"></p>';
}
function pc(){ result.innerText=(a.value/b.value)*100+"%"; }

function base64(){
toolArea.innerHTML='<input id="txt"><br><button onclick="b64()">Encode</button><p id="result"></p>';
}
function b64(){ result.innerText=btoa(txt.value); }

function binary(){
toolArea.innerHTML='<input id="txt"><br><button onclick="bin()">Convert</button><p id="result"></p>';
}
function bin(){
let r="";
for(let i=0;i<txt.value.length;i++){
r+=txt.value.charCodeAt(i).toString(2)+" ";
}
result.innerText=r;
}

function color(){
toolArea.innerHTML='<button onclick="col()">Generate</button><p id="result"></p>';
}
function col(){
let c="#"+Math.floor(Math.random()*16777215).toString(16);
result.innerText=c;
}

function uuid(){
toolArea.innerHTML='<button onclick="uid()">Generate</button><p id="result"></p>';
}
function uid(){ result.innerText=crypto.randomUUID(); }

function timestamp(){
toolArea.innerHTML='<button onclick="ts()">Get</button><p id="result"></p>';
}
function ts(){ result.innerText=Date.now(); }

function slug(){
toolArea.innerHTML='<input id="txt"><br><button onclick="sl()">Convert</button><p id="result"></p>';
}
function sl(){ result.innerText=txt.value.toLowerCase().replace(/\s+/g,"-"); }

function loan(){
toolArea.innerHTML='<input id="p" placeholder="Principal"><input id="r" placeholder="Rate %"><input id="n" placeholder="Months"><br><button onclick="emi()">Calculate</button><p id="result"></p>';
}
function emi(){
let P=parseFloat(p.value);
let R=parseFloat(r.value)/100/12;
let N=parseFloat(n.value);
let E=(P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);
result.innerText="EMI: "+E.toFixed(2);
}

function gst(){
toolArea.innerHTML='<input id="price"><input id="rate"><br><button onclick="gstc()">Calc</button><p id="result"></p>';
}
function gstc(){ result.innerText=parseFloat(price.value)*(1+rate.value/100); }

function discount(){
toolArea.innerHTML='<input id="price"><input id="disc"><br><button onclick="discCalc()">Calc</button><p id="result"></p>';
}
function discCalc(){ result.innerText=price.value-(price.value*disc.value/100); }

function timerTool(){
toolArea.innerHTML='<input id="sec"><br><button onclick="start()">Start</button><p id="result"></p>';
}
function start(){
let s=parseInt(sec.value);
let t=setInterval(()=>{
result.innerText=s;
s--;
if(s<0) clearInterval(t);
},1000);
}
