<style>
body{margin:0;font-family:Segoe UI;background:#f4f6f9;transition:0.3s;}
header{background:#0f172a;color:white;padding:15px;text-align:center;font-size:22px;}
.nav{display:flex;justify-content:center;gap:10px;background:#1e293b;padding:10px;}

.social{position:fixed;right:10px;top:40%;}

<script>
// Dark Mode
function toggleDark(){document.body.classList.toggle("dark");}

// Visitor
let visits=localStorage.getItem("visits")||0;
visits++;localStorage.setItem("visits",visits);
document.getElementById("visitor").innerText="Visitors: "+visits;

// Password
function genPass(){
let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let pass="";for(let i=0;i<12;i++){pass+=chars.charAt(Math.floor(Math.random()*chars.length));}
document.getElementById("pass").innerText=pass;
}

// EMI
function calcEMI(){
let P=loan.value,R=rate.value/1200,N=month.value;
let EMI=(P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);
document.getElementById("emi").innerText="EMI: "+EMI.toFixed(2);
}

// QR
function makeQR(){qr.innerHTML="<img src='https://api.qrserver.com/v1/create-qr-code/?size=120x120&data="+qrtext.value+"'>";}

// Word
function countWord(){
let text=wordtext.value.trim();
let words=text?text.split(/\s+/).length:0;
wordcount.innerText="Words: "+words;
}

// Search
function goSearch(){window.open("https://www.google.com/search?q="+search.value);}

// JPG PNG
function convertPNG(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=function(evt){
let img=new Image();
img.onload=function(){
let canvas=document.createElement("canvas");
canvas.width=img.width;canvas.height=img.height;
canvas.getContext("2d").drawImage(img,0,0);
downloadPNG.href=canvas.toDataURL("image/png");
downloadPNG.download="converted.png";
downloadPNG.innerText="Download PNG";
};
img.src=evt.target.result;
};
reader.readAsDataURL(file);
}

// Admin
function showAdmin(){admin.style.display="block";}
function showTools(){admin.style.display="none";}
function login(){
if(adminpass.value==="1234"){admincontent.style.display="block";alert("Login Success");}
else{alert("Wrong Password");}
}
function addArticle(){
let articles=JSON.parse(localStorage.getItem("articles"))||[];
articles.push({title:title.value,content:content.value});
localStorage.setItem("articles",JSON.stringify(articles));
loadArticles();alert("Published");
}
function loadArticles(){
let articles=JSON.parse(localStorage.getItem("articles"))||[];
let html="";
articles.forEach(a=>{html+="<div class='card'><h4>"+a.title+"</h4><p>"+a.content+"</p></div>";});
articlesDiv=document.getElementById("articles");
articlesDiv.innerHTML=html;
}
loadArticles();

// Ad Timer
let adTime=10;
function startAdTimer(){
let countdown=setInterval(function(){
adTime--;
adTimer.innerText="Wait "+adTime+" sec";
if(adTime<=0){clearInterval(countdown);unlockBtn.disabled=false;adTimer.innerText="Unlocked";}
},1000);
}
function openAd(){window.open("https://www.effectivegatecpm.com/tf7ue455r?key=905a97bdf8c5cacc589679acb64b13ef");}

// Auto Refresh
setInterval(()=>{location.reload();},60000);
</script>
