<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amir Hamza Premium Tools</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6f9;}
header{background:#0f172a;color:white;padding:15px;text-align:center;font-size:20px;font-weight:bold;}
.container{padding:15px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;}
.card{background:white;padding:15px;border-radius:12px;text-align:center;box-shadow:0 3px 8px rgba(0,0,0,0.08);}
.card i{font-size:28px;margin-bottom:8px;color:#2563eb;}
input,textarea{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
button{background:#2563eb;color:white;border:none;padding:8px;border-radius:6px;margin-top:5px;}
button:disabled{background:gray;}
.ad-box{text-align:center;margin:15px 0;}
footer{background:#0f172a;color:white;text-align:center;padding:12px;margin-top:30px;}
.social{position:fixed;right:5px;top:40%;}
.social a{display:block;background:#2563eb;color:white;padding:6px;margin:4px 0;text-decoration:none;border-radius:4px;font-size:13px;}
</style>
</head>

<body>

<header>Amir Hamza Premium Tools Hub</header>

<div class="container">

<!-- 🔥 TOP BANNER AD -->
<div class="ad-box">
<script>
atOptions = {
'key' : '2c315d711f36c4e1708a3dda9be62807',
'format' : 'iframe',
'height' : 90,
'width' : 728,
'params' : {}
};
</script>
<script src="https://www.highperformanceformat.com/2c315d711f36c4e1708a3dda9be62807/invoke.js"></script>
</div>

<h2>Online Tools</h2>

<div class="grid">

<div class="card">
<i class="fa-solid fa-key"></i>
<h4>Password Generator</h4>
<button onclick="genPass()">Generate</button>
<p id="pass"></p>
</div>

<div class="card">
<i class="fa-solid fa-calculator"></i>
<h4>EMI Calculator</h4>
<input type="number" id="loan" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest %">
<input type="number" id="month" placeholder="Months">
<button onclick="calcEMI()">Calculate</button>
<p id="emi"></p>
</div>

<div class="card">
<i class="fa-solid fa-qrcode"></i>
<h4>QR Generator</h4>
<input type="text" id="qrtext" placeholder="Enter Text">
<button onclick="makeQR()">Generate</button>
<div id="qr"></div>
</div>

<div class="card">
<i class="fa-solid fa-file-word"></i>
<h4>Word Counter</h4>
<textarea id="wordtext"></textarea>
<button onclick="countWord()">Count</button>
<p id="wordcount"></p>
</div>

<div class="card">
<i class="fa-brands fa-google"></i>
<h4>Google Search</h4>
<input type="text" id="search">
<button onclick="goSearch()">Search</button>
</div>

<div class="card">
<i class="fa-solid fa-image"></i>
<h4>JPG to PNG</h4>
<input type="file" accept="image/*" onchange="convertPNG(event)">
<a id="downloadPNG"></a>
</div>

<div class="card">
<i class="fa-solid fa-clock"></i>
<h4>Ad Timer Unlock</h4>
<p id="adTimer">Click Start</p>
<button onclick="startAdTimer()">Start</button>
<button onclick="openAd()">Open Ad</button>
<button id="unlockBtn" disabled>Continue</button>
</div>

</div>

</div>

<!-- 🔥 DIRECT LINK AD -->
<div class="ad-box">
<a href="https://www.effectivegatecpm.com/tf7ue455r?key=905a97bdf8c5cacc589679acb64b13ef" target="_blank">
<button>Sponsored Link</button>
</a>
</div>

<footer>
Developer: Amir Hamza
</footer>

<div class="social">
<a href="#">Telegram</a>
<a href="#">WhatsApp</a>
<a href="#">Facebook</a>
<a href="#">Instagram</a>
</div>

<script>
function genPass(){
let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let pass="";
for(let i=0;i<12;i++){pass+=chars[Math.floor(Math.random()*chars.length)];}
pass.innerText="";
document.getElementById("pass").innerText=pass;
}

function calcEMI(){
let P=loan.value,R=rate.value/1200,N=month.value;
let EMI=(P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);
document.getElementById("emi").innerText="EMI: "+EMI.toFixed(2);
}

function makeQR(){
qr.innerHTML="<img src='https://api.qrserver.com/v1/create-qr-code/?size=120x120&data="+qrtext.value+"'>";
}

function countWord(){
let text=wordtext.value.trim();
let words=text?text.split(/\s+/).length:0;
wordcount.innerText="Words: "+words;
}

function goSearch(){
window.open("https://www.google.com/search?q="+search.value);
}

function convertPNG(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=function(evt){
let img=new Image();
img.onload=function(){
let canvas=document.createElement("canvas");
canvas.width=img.width;
canvas.height=img.height;
canvas.getContext("2d").drawImage(img,0,0);
downloadPNG.href=canvas.toDataURL("image/png");
downloadPNG.download="converted.png";
downloadPNG.innerText="Download PNG";
};
img.src=evt.target.result;
};
reader.readAsDataURL(file);
}

let adTime=10;
function startAdTimer(){
let countdown=setInterval(function(){
adTime--;
adTimer.innerText="Wait "+adTime+" sec";
if(adTime<=0){
clearInterval(countdown);
unlockBtn.disabled=false;
adTimer.innerText="Unlocked";
}
},1000);
}

function openAd(){
window.open("https://www.effectivegatecpm.com/tf7ue455r?key=905a97bdf8c5cacc589679acb64b13ef");
}
</script>

</body>
</html>
