<div class="tool-box">
<h3><i class="fa fa-search"></i> Google Search</h3>

<h3><i class="fa fa-image"></i> Image to Base64</h3>

<textarea id="imgOutput" rows="3" style="width:100%"></textarea>

<div class="tool-box">

<button onclick="calcAge()">Calculate</button>
<p id="ageResult"></p>
</div>

<div class="tool-box">
<h3><i class="fa fa-money-bill"></i> EMI Calculator</h3>
<input type="number" id="loan" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest %">
<input type="number" id="months" placeholder="Months">
<button onclick="emiCalc()">Calculate</button>
<p id="emiResult"></p>
</div>

<div class="tool-box">
<h3><i class="fa fa-font"></i> Word Counter</h3>

<button onclick="countWords()">Count</button>
<p id="wordResult"></p>
</div>

<script>

document.getElementById("imgInput").addEventListener("change",function(){
let reader=new FileReader();
reader.onload=function(){
imgOutput.value=reader.result;
};
reader.readAsDataURL(this.files[0]);
});

function qr(){
qrResult.innerHTML="<img src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+qrText.value+"'>";
}

function genPass(){
let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
let pass="";
for(let i=0;i<12;i++){pass+=chars.charAt(Math.floor(Math.random()*chars.length));}
document.getElementById("pass").innerText=pass;
}

function calcAge(){
let birth=new Date(dob.value);
let age=new Date().getFullYear()-birth.getFullYear();
ageResult.innerText="Age: "+age+" years";
}

function emiCalc(){
let P=loan.value;
let R=rate.value/1200;
let N=months.value;
let EMI=(P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);
emiResult.innerText="Monthly EMI: "+EMI.toFixed(2);
}

function countWords(){
let text=textInput.value.trim();
let words=text.split(/\s+/).length;
wordResult.innerText="Words: "+words;
}

function speak(){
let msg=new SpeechSynthesisUtterance(ttsText.value);
speechSynthesis.speak(msg);
}

</script>
